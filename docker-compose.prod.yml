version: '3.8'

services:
  # 1. DATABASE
  db:
    image: postgres:15
    volumes:
      - production_postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=your_ultra_secure_password_here
      - POSTGRES_DB=medisync_db

  # 2. FASTAPI BACKEND
  backend:
    build: 
      context: .
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    env_file:
      - .env
    depends_on:
      - db

  # 3. NEXT.JS FRONTEND
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://46.101.155.231:8001
    ports:
      - "3000:3000"

volumes:
  production_postgres_data: